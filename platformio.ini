; RICOH GR x M5Stack StickS3 Remote Viewfinder
; Target: M5Stack StickS3 (ESP32-S3-PICO-1-N8R8, 8MB Flash, 8MB PSRAM)

[platformio]
default_envs = m5stack-sticks3

[env:m5stack-sticks3]
platform = espressif32@6.12.0
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
upload_speed = 921600

board_build.arduino.partitions = default_8MB.csv
board_build.arduino.memory_type = qio_opi

build_flags =
    -DESP32S3
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=1

lib_deps =
    M5Unified=https://github.com/m5stack/M5Unified
    M5PM1=https://github.com/m5stack/M5PM1
    bitbank2/JPEGDEC@^1.8.2
    bblanchon/ArduinoJson@^7.0.0
    h2zero/NimBLE-Arduino@2.5.0

; BLE uses NimBLE-Arduino for stable reconnect after camera power cycles.

; GR IIIx build — same hardware as m5stack-sticks3, but with GR IIIx-specific
; GATT handles (verified from an on-device GATT dump, see src/config.h). Runs the
; full Wi-Fi/LiveView flow: openWifi() writes 0x01 to the GR IIIx Network Type
; characteristic (handle 0x00F0) to switch the camera into AP mode, then reads the
; static SSID (0x00F3) / passphrase (0x00F5) and connects STA for MJPEG LiveView.
; BLE shutter (AF + capture) works in parallel.
;   platformio run -e m5stack-sticks3-gr3x -t upload
[env:m5stack-sticks3-gr3x]
extends = env:m5stack-sticks3
build_flags =
    ${env:m5stack-sticks3.build_flags}
    -DCAMERA_MODEL_GR3X
    ; Re-enable for GATT handle discovery on a new camera (prints the full
    ; services/characteristics table on connect). Leaving it off keeps the
    ; serial log clean for normal use.
    ; -DRICOH_BLE_GATT_DUMP_ON_CONNECT=1

; GR IIIx BLE shutter-only build — same GR IIIx handles as m5stack-sticks3-gr3x,
; but stays in BLE_READY as a pure remote shutter (AF + capture) and never brings
; up Wi-Fi / LiveView. Use this if you only want the BLE remote without the
; screen preview (lower power, faster connect).
;   platformio run -e m5stack-sticks3-gr3x-shutter -t upload
[env:m5stack-sticks3-gr3x-shutter]
extends = env:m5stack-sticks3-gr3x
build_flags =
    ${env:m5stack-sticks3-gr3x.build_flags}
    -DRICOH_BLE_SHUTTER_ONLY_MODE=1

; Live-view refresh-rate tuning build — same hardware/handles as
; m5stack-sticks3, just decodes at quarter scale instead of half. Use this to
; quickly A/B whether decode/render time (see WifiPreviewService's
; decode_ms/render_ms serial stats) is the bottleneck vs network read time,
; without editing src/config.h.
;   platformio run -e m5stack-sticks3-fastpreview -t upload
[env:m5stack-sticks3-fastpreview]
extends = env:m5stack-sticks3
build_flags =
    ${env:m5stack-sticks3.build_flags}
    -DJPEG_SCALE_POLICY=JPEG_SCALE_QUARTER

[env:native]
platform = native
test_build_src = yes
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
build_src_filter =
    -<*>
    +<ble_reconnect_policy.cpp>
    +<camera_identity.cpp>
    +<mjpeg_stream.cpp>
    +<supervisor/SystemSupervisor.cpp>
test_filter = test_native
