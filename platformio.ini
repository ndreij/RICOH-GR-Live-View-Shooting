; RICOH GR x M5Stack StickS3 Remote Viewfinder
; Target: M5Stack StickS3 (ESP32-S3-PICO-1-N8R8, 8MB Flash, 8MB PSRAM)

[platformio]
default_envs = m5stack-sticks3

[env:m5stack-sticks3]
platform = espressif32@6.12.0
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
upload_speed = 921600

board_build.arduino.partitions = default_8MB.csv
board_build.arduino.memory_type = qio_opi

build_flags =
    -DESP32S3
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=1

lib_deps =
    M5Unified=https://github.com/m5stack/M5Unified
    M5PM1=https://github.com/m5stack/M5PM1
    bitbank2/JPEGDEC@^1.8.2
    bblanchon/ArduinoJson@^7.0.0
    h2zero/NimBLE-Arduino@2.5.0

; BLE uses NimBLE-Arduino for stable reconnect after camera power cycles.

; GR IIIx build — uses the same hardware but GR IIIx-specific GATT handles.
; WLAN/power handles are placeholders (0) until verified from a serial GATT dump.
; BLE scanning, pairing, and shutter (UUID-based) will work; LiveView requires
; filling in the TODO handle values in src/config.h once captured.
[env:m5stack-sticks3-gr3x]
extends = env:m5stack-sticks3
build_flags =
    ${env:m5stack-sticks3.build_flags}
    -DCAMERA_MODEL_GR3X
    ; Re-enable for handle discovery on a new camera. Leaving it off keeps
    ; connects clean (the dump path also fires a diagnostic shoot() probe).
    ; -DRICOH_BLE_GATT_DUMP_ON_CONNECT=1

; Live-view refresh-rate tuning build — same hardware/handles as
; m5stack-sticks3, just decodes at quarter scale instead of half. Use this to
; quickly A/B whether decode/render time (see WifiPreviewService's
; decode_ms/render_ms serial stats) is the bottleneck vs network read time,
; without editing src/config.h.
;   platformio run -e m5stack-sticks3-fastpreview -t upload
[env:m5stack-sticks3-fastpreview]
extends = env:m5stack-sticks3
build_flags =
    ${env:m5stack-sticks3.build_flags}
    -DJPEG_SCALE_POLICY=JPEG_SCALE_QUARTER

[env:native]
platform = native
test_build_src = yes
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
build_src_filter =
    -<*>
    +<ble_reconnect_policy.cpp>
    +<camera_identity.cpp>
    +<mjpeg_stream.cpp>
    +<supervisor/SystemSupervisor.cpp>
test_filter = test_native
